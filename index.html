<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="icon" href="data:,">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&display=swap');
  </style>
  <title>Ejercicio WebStorege - 2</title>
</head>  
<body class="h-full md:h-screen m-0 overflow-y-auto md:overflow-hidden flex flex-col items-center px-4 md:pl-0 md:pr-[30%] box-border w-full bg-[url('./img/foto.png')] bg-no-repeat bg-left md:bg-center bg-cover bg-fixed py-4">

  <h1 class="font-serif font-bold text-4xl md:text-7xl bg-clip-text text-transparent select-none tracking-wide text-center mt-2 shrink-0" style="background-image: linear-gradient(to left, #ff9a9e, #fad0c4, #a1c4fd);">
    LISTA DE COMPRAS
  </h1>
        
  <div class="w-full max-w-[900px] my-3 bg-white/90 p-4 rounded-xl shadow-lg border border-indigo-100 flex flex-col gap-3 shrink-0">
    <h2 class="text-indigo-950 font-bold text-base">Agregar Producto</h2>
    
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <div>
        <label for="producto-input" class="block text-xs font-bold text-indigo-400 uppercase mb-1">Producto</label>
        <input id="producto-input" type="text" placeholder="Ej: Pan" class="w-full p-2 text-sm border-2 border-[#fe9da0] rounded-md focus:outline-none text-slate-900">
      </div>
      <div>
        <label for="cantidad-input" class="block text-xs font-bold text-indigo-400 uppercase mb-1">Cantidad</label>
        <input id="cantidad-input" type="number" placeholder="Ej: 2" min="1" class="w-full p-2 text-sm border-2 border-[#fe9da0] rounded-md focus:outline-none text-slate-900">
      </div>
      <div>
        <label for="precio-input" class="block text-xs font-bold text-indigo-400 uppercase mb-1">Precio Estimado</label>
        <input id="precio-input" type="number" placeholder="Ej: 1.50" step="0.01" class="w-full p-2 text-sm border-2 border-[#fe9da0] rounded-md focus:outline-none text-slate-900">
      </div>
    </div>

    <button id="btn-agregar" class="w-full bg-[#fe9da0] hover:bg-[#ff8689] active:scale-[0.99] text-indigo-950 font-bold py-2 px-4 rounded-md transition-all text-sm">
      Agregar a la lista
    </button>
  </div>

  <div class="w-full max-w-[900px] flex flex-col grow min-h-[25vh] md:min-h-0">
    <div id="list" class="border-2 border-[#fe9da0] rounded-xl w-full grow bg-white shadow-inner p-4 overflow-y-auto min-h-[150px]"></div>
    
    <div class="flex flex-col sm:flex-row gap-3 my-3 shrink-0">
      <div class="flex gap-2 grow w-full sm:w-auto">
        <input form="btn-eliminar" id="pos-input" type="number" placeholder="Nº de producto" class="p-2 w-full sm:w-48 text-sm border-2 border-[#fe9da0] rounded-md focus:outline-none text-slate-900">
        <button id="btn-eliminar" class="bg-[#fe9da0] hover:bg-[#ff8689] text-sm text-indigo-950 font-bold py-2 px-4 rounded-md transition-all whitespace-nowrap grow sm:grow-0">
          Eliminar por posición
        </button>
      </div>
      <button id="btn-calcular" class="w-full sm:w-auto bg-[#fe9da0] hover:bg-[#be777a] text-indigo-950 font-bold py-2 px-6 rounded-md transition-all shadow-md active:scale-95 text-sm">
        Calcular estimado a gastar
      </button>
    </div>
  </div>
    
  <div id="mensaje" class="w-full max-w-[900px] text-red-600 font-bold min-h-[1.2em] my-1 text-center text-sm shrink-0"></div>

  <button id="btn-vaciar" class="w-full sm:w-auto mb-2 bg-[#fe9da0] hover:bg-[#be777a] text-indigo-950 font-bold py-2 px-8 rounded-md shadow-md active:scale-95 transition-all text-sm uppercase tracking-wider shrink-0">
    Vaciar el carrito
  </button>

  <dialog id="modal-ticket" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-xl shadow-2xl p-6 bg-indigo-50 border border-indigo-200 max-w-md w-[90%] sm:w-full backdrop:blur-sm focus:outline-none">
    <div class="space-y-4">
      <div class="text-sm font-bold uppercase tracking-wider text-[#dc686c] border-b border-indigo-200 pb-1 text-center">
        Ticket Estimado de Compra
      </div>
      
      <ul id="modal-lista-productos" class="divide-y divide-indigo-200/60 space-y-1 max-h-[40vh] overflow-y-auto px-1"></ul>
      
      <div class="text-base font-bold text-indigo-900 flex justify-between pt-2 border-t border-dashed border-indigo-300">
        <span>TOTAL A GASTAR:</span>
        <span id="modal-total">0.00</span>
      </div>

      <button id="btn-cerrar-modal" class="w-full bg-[#dc686c] hover:bg-[#dc4c50] text-white font-bold py-2 rounded-md transition-colors text-sm">
        Cerrar Ticket
      </button>
    </div>
  </dialog>

  <script src="./js/app.js"></script>
</body>
</html>
